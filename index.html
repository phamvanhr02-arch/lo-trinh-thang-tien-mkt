<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống Thăng tiến Marketing — KEECOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2a6ff0; --blue-d:#1a52c7; --blue-50:#eef4ff; --blue-100:#dbe7ff;
  --ink:#1a1a2e; --ink-2:#4a4f5e; --muted:#7b8190; --line:#e7eaf0;
  --bg:#f7f9fc; --card:#ffffff;
  --green:#16a36a; --green-50:#e8f7f0;
  --amber:#d98a00; --amber-50:#fbf3e0;
  --red:#e0405a; --red-50:#fcebef;
  --purple:#7a5af0; --purple-50:#f0ecfe;
  --radius:14px; --shadow:0 1px 2px rgba(20,30,60,.04),0 6px 20px rgba(20,30,60,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px}
.app{min-height:100vh}

/* Top nav (LadiPage style) */
.topnav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 1px 12px rgba(20,30,60,.04)}
.topnav .inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:11px 28px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#5a93ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(42,111,240,.35)}
.brand .bt{font-size:10px;letter-spacing:.12em;color:var(--blue);font-weight:700}
.brand .bn{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
/* department tabs (chừa chỗ cho phòng ban khác sau này) */
.depts{display:flex;gap:6px;border-left:1px solid var(--line);padding-left:14px}
.dept{font-size:13px;font-weight:600;padding:7px 14px;border-radius:9px;cursor:pointer;color:var(--ink-2);white-space:nowrap}
.dept.active{background:var(--blue-50);color:var(--blue-d)}
.dept.soon{color:var(--muted);opacity:.55;cursor:default}
/* section menu (dropdown theo nhóm) */
.menu{display:flex;align-items:center;gap:2px;margin-left:auto;flex-wrap:wrap}
.dd{position:relative}
.dd>button{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);padding:9px 13px;border-radius:9px;cursor:pointer}
.dd>button:hover,.dd.has-active>button{background:var(--blue-50);color:var(--blue-d)}
.dd>button .ca{font-size:8px;opacity:.7;transition:.2s}
.dd.show>button .ca{transform:rotate(180deg)}
.dd .panel{position:absolute;top:calc(100% + 7px);right:0;min-width:230px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 36px rgba(20,30,60,.15);padding:7px;display:none;z-index:60}
.dd.show .panel{display:block}
.dd .panel a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:var(--ink-2);text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;white-space:nowrap}
.dd .panel a .ic{width:18px;text-align:center;font-size:15px;opacity:.9}
.dd .panel a:hover{background:var(--blue-50);color:var(--blue-d)}
.dd .panel a.active{background:var(--blue);color:#fff;font-weight:600}

/* Main */
.main{max-width:1180px;margin:0 auto;padding:36px 28px 50px}
.foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
.eyebrow{display:inline-block;background:var(--blue-50);color:var(--blue-d);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 13px;border-radius:999px;margin-bottom:16px}
h1.title{font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:12px}
.lead{font-size:15.5px;color:var(--ink-2);max-width:760px;margin-bottom:30px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 6px}
.lg{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 15px;font-size:13.5px;color:var(--ink-2);box-shadow:var(--shadow)}
.lg .lgd{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lg b{color:var(--ink)}
.lead b{color:var(--ink)}
.sec{display:none;animation:fade .3s ease}
.sec.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:34px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;box-shadow:var(--shadow)}
.stat .num{font-size:34px;font-weight:800;color:var(--blue);line-height:1}
.stat .lb{margin-top:8px;font-weight:600;font-size:14px}
.stat .sub{color:var(--muted);font-size:12.5px;margin-top:2px}

.block-h{display:flex;align-items:center;gap:10px;margin:34px 0 18px}
.block-h{margin:38px 0 18px}
.block-h .pill{background:var(--blue);color:#fff;font-size:15px;font-weight:700;letter-spacing:.01em;padding:10px 20px;border-radius:999px;box-shadow:0 5px 14px rgba(42,111,240,.28)}
.block-h .sub{color:var(--ink-2);font-size:13.5px}
.coll>.block-h{cursor:pointer;user-select:none}
.block-h .cv{margin-left:auto;color:var(--muted);font-size:13px;transition:.25s;flex-shrink:0}
.coll.closed .cv{transform:rotate(-90deg)}
.coll.closed .collbody{display:none}

/* Ladder (progression flow) */
.ladder{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.rung{padding:18px 16px;border-top:4px solid var(--line);position:relative}
.rung+.rung{border-left:1px solid var(--line)}
.rung .tag{font-size:10.5px;letter-spacing:.1em;font-weight:700;color:var(--muted);text-transform:uppercase}
.rung .nm{font-size:16px;font-weight:700;margin-top:6px}
.rung .pay{font-size:12.5px;color:var(--ink-2);margin-top:6px}
.rung.r0{border-top-color:#cbd2de}
.rung.r1{border-top-color:var(--green)}
.rung.r2{border-top-color:var(--blue)}
.rung.r3{border-top-color:var(--amber)}
.rung.r4{border-top-color:var(--purple)}
.rung.r5{border-top-color:var(--red);border-top-style:dashed}

/* generic cards */
.cards{display:grid;gap:16px}
.poss{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.poss .card{display:flex;flex-direction:column}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* career path — 1 hàng, có số & mũi tên thăng tiến */
.career{display:flex;align-items:stretch;gap:0;margin-top:4px}
.pcard{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-top-width:3px;border-radius:var(--radius);padding:16px 15px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.pcard .pnum{width:28px;height:28px;border-radius:50%;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;margin-bottom:10px}
.pcard h4{font-size:14.5px;font-weight:700;line-height:1.25}
.pcard .role{font-size:12px;color:var(--blue);font-weight:600;margin-top:3px}
.pcard .badge{margin:8px 0;align-self:flex-start;white-space:normal;line-height:1.35;max-width:100%}
.pcard p{font-size:12.5px;color:var(--ink-2);line-height:1.45;margin:2px 0 0}
.parrow{display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:20px;font-weight:800;flex-shrink:0;padding:0 5px}
/* OR-set: 3 tiêu chí nối bằng HOẶC + thanh VÀ */
.orset{display:flex;align-items:stretch;gap:0;margin-top:4px}
.orcard{flex:1;min-width:0;background:#fff;border:1px solid var(--line);border-top-width:3px;border-radius:12px;padding:15px 16px;display:flex;flex-direction:column}
.orcard .oh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.orcard .onum{width:28px;height:28px;border-radius:50%;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.orcard .ot{font-size:14.5px;font-weight:700;line-height:1.25}
.orcard p{font-size:13px;color:var(--ink-2);line-height:1.5;margin:0}
.orjoin{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:.06em;color:var(--muted);flex-shrink:0;padding:0 9px}
.andbar{display:flex;align-items:center;gap:13px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;padding:13px 17px;margin-top:14px}
.andbar .ab{background:var(--blue);color:#fff;font-weight:800;font-size:12px;padding:6px 13px;border-radius:8px;flex-shrink:0}
.andbar .at{font-size:13.5px;color:var(--ink-2)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow)}
.card h3{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card .role{font-size:12.5px;color:var(--blue);font-weight:600;margin-top:3px}
.card p.d{color:var(--ink-2);margin-top:10px;font-size:14px}

.badge{font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:999px;white-space:nowrap}
.b-blue{background:var(--blue-50);color:var(--blue-d)}
.b-green{background:var(--green-50);color:var(--green)}
.b-amber{background:var(--amber-50);color:var(--amber)}
.b-red{background:var(--red-50);color:var(--red)}
.b-purple{background:var(--purple-50);color:var(--purple)}
.b-gray{background:#eef0f4;color:var(--muted)}

/* criteria list */
.crit{list-style:none;margin-top:12px}
.crit li{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:14px}
.crit li:first-child{border-top:none}
.crit li .dot{width:8px;height:8px;border-radius:50%;margin-top:7px;flex-shrink:0}
.dot-r{background:var(--red)}.dot-g{background:var(--green)}.dot-b{background:var(--blue)}.dot-a{background:var(--amber)}
.crit li b{color:var(--ink)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card .way{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--blue);color:#fff;font-weight:700;font-size:13px;margin-right:8px}
.note{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;padding:16px 18px;font-size:13.5px;color:var(--ink-2)}
.note h4{color:var(--blue-d);font-size:14px;margin-bottom:8px}
.note ul{margin-left:16px}.note li{margin:4px 0}

/* mechanism grid */
.mech{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.mech .m{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.mech .m .ico{width:34px;height:34px;border-radius:9px;background:var(--blue-50);color:var(--blue-d);display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.mech .m h4{font-size:14.5px;font-weight:700}
.mech .m p{font-size:13.5px;color:var(--ink-2);margin-top:5px}

/* timeline */
.phase{margin-bottom:26px}
.phase>.lbl{display:inline-block;font-weight:600;font-size:13px;color:#fff;padding:7px 15px;border-radius:999px;margin-bottom:14px}
.tl{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tl .col{padding:16px 16px;border-left:1px solid var(--line)}
.tl .col:first-child{border-left:none}
.tl .col .t{font-weight:700;font-size:14px}
.tl .col .s{font-size:11.5px;color:var(--muted);margin-bottom:8px}
.tl .col ul{list-style:none}
.tl .col li{font-size:13px;color:var(--ink-2);padding:3px 0;padding-left:14px;position:relative}
.tl .col li::before{content:"›";position:absolute;left:0;color:var(--blue);font-weight:700}

/* competency accordion */
.cmp{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.cmp>.hd{display:flex;align-items:center;gap:13px;padding:16px 20px;cursor:pointer;user-select:none}
.cmp>.hd:hover{background:#fafbfd}
.cmp .idx{width:30px;height:30px;border-radius:9px;background:var(--blue);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cmp .ti{flex:1}
.cmp .ti .gn{font-size:10.5px;letter-spacing:.08em;font-weight:700;text-transform:uppercase;color:var(--muted)}
.cmp .ti .nn{font-size:15.5px;font-weight:700;margin-top:1px}
.cmp .chev{color:var(--muted);transition:.25s;font-size:13px}
.cmp.open .chev{transform:rotate(180deg)}
.cmp .bd{display:none;padding:0 20px 20px}
.cmp.open .bd{display:block}
.cmp .bd .card{box-shadow:none}
.cmp .bd>.crit{padding:0 2px}
.cmp .def{font-style:italic;color:var(--ink-2);font-size:13.5px;background:var(--bg);border-radius:10px;padding:12px 15px;margin-bottom:14px}
.lvls{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.lv{border:1px solid var(--line);border-radius:11px;padding:13px 14px;background:#fff}
.lv .lh{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.lv .lc{font-size:10.5px;font-weight:700;color:var(--blue-d);background:var(--blue-50);padding:2px 8px;border-radius:6px}
.lv .lt{font-size:12px;font-weight:700;line-height:1.3}
.lv ul{list-style:none}
.lv li{font-size:12.5px;color:var(--ink-2);padding:3px 0 3px 12px;position:relative}
.lv li::before{content:"•";position:absolute;left:0;color:var(--blue)}
.lv.l1 .lc{background:#eef0f4;color:var(--muted)}
.lv.l2 .lc{background:var(--green-50);color:var(--green)}
.lv.l3 .lc{background:var(--amber-50);color:var(--amber)}
.lv.l4 .lc{background:var(--purple-50);color:var(--purple)}
.ex{margin-top:13px;font-size:12.5px;color:var(--ink-2)}
.ex a{display:inline-flex;align-items:center;gap:6px;color:var(--blue);text-decoration:none;background:var(--blue-50);padding:5px 11px;border-radius:8px;margin:5px 6px 0 0;font-weight:600;font-size:12px}
.ex a:hover{background:var(--blue-100)}
.grp-divider{display:flex;align-items:center;gap:10px;margin:24px 0 14px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.grp-divider::after{content:"";flex:1;height:1px;background:var(--line)}

/* job-description table (phong cách Excel) */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:8px}
.jt{width:100%;min-width:680px;border-collapse:collapse;background:#fff;font-size:13.5px}
.jt thead th{background:#5ccfc6;color:#08403c;font-weight:700;font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;padding:13px 15px;text-align:left;border-bottom:2px solid #46bcb3;white-space:nowrap}
.jt td{padding:13px 15px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink-2);line-height:1.5}
.jt tbody tr:last-child td{border-bottom:none}
.jt tbody tr:hover{background:#f5fbfb}
.jt .stt{text-align:center;font-weight:700;color:var(--muted);width:44px}
.jt .lvc{text-align:center;width:74px}
.jt .desc{color:var(--ink);font-weight:500}
.cat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;padding:4px 10px;border-radius:999px;white-space:nowrap}
.cat-cm{background:#ece8fc;color:#6a4ee0}
.cat-ql{background:#fce8d2;color:#cf8500}
.cat-ch{background:#d4eff1;color:#138f8a}
.lvbadge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:var(--blue-50);color:var(--blue-d);font-weight:700;font-size:14px}
/* competency table (4 cấp độ dạng bảng) */
.kt{min-width:1040px}
.kt .ktname{min-width:180px;max-width:210px}
.kt .ktnn{font-weight:700;color:var(--ink);font-size:13.5px}
.kt .ktdef{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;line-height:1.4}
.kt .ktlv{min-width:205px;vertical-align:top}
.kt .ktlvt{font-weight:700;font-size:11.5px;margin-bottom:5px;line-height:1.3}
.kt .ktsub{font-size:10.5px;color:var(--muted);margin:-2px 0 5px}
.kt .lc{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-right:5px}
.kt .lc.l1{background:#eef0f4;color:var(--muted)}
.kt .lc.l2{background:var(--green-50);color:var(--green)}
.kt .lc.l3{background:var(--amber-50);color:var(--amber)}
.kt .lc.l4{background:var(--purple-50);color:var(--purple)}
.kt ul{list-style:none;margin:0}
.kt li{font-size:12px;color:var(--ink-2);padding:2px 0 2px 11px;position:relative;line-height:1.4}
.kt li::before{content:"•";position:absolute;left:0;color:var(--blue)}
.kt .ktgrp td{background:#eef2f8;font-weight:700;font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;padding:8px 15px}
.kt .ktex{margin-top:7px}
.kt .ktex a{display:inline-block;font-size:10.5px;font-weight:600;color:var(--blue-d);text-decoration:none;background:var(--blue-50);padding:3px 8px;border-radius:6px;margin:3px 4px 0 0}

/* process steps */
.steps{counter-reset:s}
.step{display:flex;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
.step:first-child{border-top:none}
.step .n{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step .c h4{font-size:15px;font-weight:700}
.step .c ul{list-style:none;margin-top:7px}
.step .c li{font-size:13.5px;color:var(--ink-2);padding:2px 0 2px 14px;position:relative}
.step .c li::before{content:"–";position:absolute;left:0;color:var(--blue)}
/* horizontal process flow */
.flow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.fstep{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative}
.fstep .fn{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--line)}
.fstep .fn .nm{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;box-shadow:0 3px 9px rgba(42,111,240,.3)}
.fstep .fn h4{font-size:14.5px;font-weight:700;line-height:1.3;padding-top:3px}
.fstep ul{list-style:none}
.fstep li{font-size:13px;color:var(--ink-2);padding:4px 0 4px 15px;position:relative;line-height:1.45}
.fstep li::before{content:"›";position:absolute;left:0;color:var(--blue);font-weight:700}

@media(max-width:980px){
  .topnav .inner{flex-wrap:wrap;gap:10px;padding:10px 16px}
  .brand .bn{display:none}
  .menu{width:100%;margin-left:0;flex-wrap:wrap;gap:4px;justify-content:flex-start}
  .dd{position:static}
  .dd .panel{position:absolute;left:14px;right:14px;min-width:0;max-width:none}
  .main{padding:22px 16px 60px}
  .stats,.ladder,.tl,.lvls,.mech,.two,.three,.flow,.poss,.g4{grid-template-columns:1fr!important}
  .career,.orset{flex-direction:column}
  .parrow{transform:rotate(90deg);padding:6px 0}
  .orjoin{padding:6px 0}
  h1.title{font-size:26px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topnav">
    <div class="inner">
      <div class="brand">
        <div class="logo">K</div>
        <div><div class="bt">KEECOM</div><div class="bn">Lộ trình Thăng tiến</div></div>
      </div>
      <div class="depts" id="depts">
        <div class="dept active">Marketing</div>

function renderComp(c){
  const lvls=c.lv.map((l,i)=>`<div class="lv l${i+1}"><div class="lh"><span class="lc">Cấp ${i+1}</span></div>
    <div class="lt">${l.c}</div>${l.t?`<div class="s" style="font-size:11px;color:var(--muted);margin:2px 0 6px">${l.t}</div>`:''}
    <ul>${l.items.map(x=>`<li>${x}</li>`).join('')}</ul></div>`).join('');
  const ex=c.ex.length?`<div class="ex"><b>Ví dụ tham khảo:</b><br>${c.ex.map(e=>`<a href="${e[1]}" target="_blank" rel="noopener">▶ ${e[0]}</a>`).join('')}</div>`:'';
  return `<div class="cmp"><div class="hd" onclick="this.parentElement.classList.toggle('open')">
    <div class="idx">${c.id}</div>
    <div class="ti"><div class="gn">${c.grp}</div><div class="nn">${c.name}</div></div>
    <div class="chev">▼</div></div>
    <div class="bd"><div class="def">${c.def}</div><div class="lvls">${lvls}</div>${ex}</div></div>`;
}
function compGroups(list){
  let html='',cur='';
  list.forEach(c=>{ if(c.grp!==cur){cur=c.grp;html+=`<div class="grp-divider">${cur}</div>`;} html+=renderComp(c); });
  return html;
}
function renderCompTable(list){
  let rows='',cur='',n=0;
  list.forEach(c=>{
    if(c.grp!==cur){cur=c.grp;rows+=`<tr class="ktgrp"><td colspan="5">${c.grp}</td></tr>`;}
    n++;
    const ex=c.ex.length?`<div class="ktex">${c.ex.map(e=>`<a href="${e[1]}" target="_blank" rel="noopener">▶ ${e[0]}</a>`).join('')}</div>`:'';
    rows+=`<tr>
      <td class="ktname"><div class="ktnn">${n}. ${c.name}</div><div class="ktdef">${c.def}</div>${ex}</td>
      ${c.lv.map((l,i)=>`<td class="ktlv"><div class="ktlvt"><span class="lc l${i+1}">Cấp ${i+1}</span>${l.c}</div>${l.t?`<div class="ktsub">${l.t}</div>`:''}<ul>${l.items.map(x=>`<li>${x}</li>`).join('')}</ul></td>`).join('')}
    </tr>`;
  });
  return `<div class="tbl-wrap"><table class="jt kt"><thead><tr><th>Năng lực</th><th>Cấp độ 1</th><th>Cấp độ 2</th><th>Cấp độ 3</th><th>Cấp độ 4</th></tr></thead><tbody>${rows}</tbody></table></div>`;

{id:'kpi',group:'VẬN HÀNH',icon:'⚠',label:'Cơ chế xử lý khi không đạt KPI',render:()=>{

/* ---------- BUILD UI ---------- */
const nav=document.getElementById('nav'), content=document.getElementById('content');
let groups={};
SECTIONS.forEach(s=>{(groups[s.group]=groups[s.group]||[]).push(s);});
Object.keys(groups).forEach(g=>{
  const dd=document.createElement('div');dd.className='dd';dd.dataset.group=g;
  dd.innerHTML=`<button>${g}<span class="ca">▼</span></button>
    <div class="panel">${groups[g].map(s=>`<a data-id="${s.id}"><span class="ic">${s.icon}</span>${s.label}</a>`).join('')}</div>`;
  nav.appendChild(dd);
});
SECTIONS.forEach(s=>{const d=document.createElement('div');d.className='sec';d.id='sec-'+s.id;d.innerHTML=s.render();content.appendChild(d);});

function closeAll(){document.querySelectorAll('.dd').forEach(d=>d.classList.remove('show'));}
document.querySelectorAll('.dd>button').forEach(b=>b.addEventListener('click',e=>{
  e.stopPropagation();const dd=b.parentElement,open=dd.classList.contains('show');closeAll();if(!open)dd.classList.add('show');
}));
document.addEventListener('click',closeAll);

function show(id){
  const sec=SECTIONS.find(s=>s.id===id);
  document.querySelectorAll('.sec').forEach(e=>e.classList.toggle('show',e.id==='sec-'+id));
  document.querySelectorAll('.panel a').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  document.querySelectorAll('.dd').forEach(d=>d.classList.toggle('has-active',d.dataset.group===sec.group));
  closeAll();window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.panel a').forEach(a=>a.addEventListener('click',()=>show(a.dataset.id)));
show('tongquan');
</script>
</body>
</html>
